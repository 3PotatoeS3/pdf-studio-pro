      html += `<div style="margin-top:16px"><span class="field-label">Selected Box Color</span></div>`;
      html += `<div class="field-group" style="display:flex;align-items:center;gap:10px">
        <input type="color" value="#ffffff" id="woColorPicker" onchange="updateWhiteoutColor(this.value)" style="width:44px;height:34px;border:none;background:transparent;cursor:pointer;flex-shrink:0">
        <span style="font-size:12px;color:var(--text-dim)">Pick any color</span></div>`;
      html += `<button class="btn-secondary" onclick="eyedropperPickColor()" style="margin-top:4px">🎯 Match Background Color</button>`;
      html += `<p style="font-size:11px;color:var(--text-ghost);margin-top:4px">Samples the color behind the center of the selected box and applies it — drag the box over the area you want to erase first.</p>`;
      if (woCount > 0) {
        html += `<p style="font-size:12px;color:var(--accent-soft);margin-top:10px">${woCount} white-out box(es) on this page</p>`;
      }
      html += `<button class="btn-primary" style="margin-top:12px" onclick="embedTextBoxesIntoPdf()">✅ Embed All Into PDF</button>`;
      html += `<p style="font-size:11px;color:var(--text-ghost);margin-top:6px">Embed permanently writes all overlays (text, signatures, white-outs) into the PDF.</p>`;
      break;

    case 'merge':
      html += `<button class="btn-primary" onclick="document.getElementById('mergeInput').click()">➕ Add PDF Files</button>`;
      if (state.mergeFiles.length > 0) {
        html += state.mergeFiles.map((f,i) => `<div class="merge-item"><span>${f.name}</span><button onclick="state.mergeFiles.splice(${i},1);renderTool()">Remove</button></div>`).join('');
        html += `<button class="btn-primary" style="margin-top:10px" onclick="doMerge()">🔗 Merge ${state.mergeFiles.length} Files</button>`;
      }
      break;

    case 'split':
      html += `<div class="field-group"><span class="field-label">Page Range</span>
        <input class="text-input" id="splitRangeInput" placeholder="e.g. 1-3, 5, 7-9" value="${state.splitRange}"></div>
        <button class="btn-primary" onclick="doSplit()">✂️ Split & Download</button>`;
      break;

    case 'rotate':
      html += `<div class="field-group"><span class="field-label">Angle</span>
        <div class="option-grid cols-3">${[90,180,270].map(a=>`<button class="option-btn ${state.rotateAngle===a?'active':''}" onclick="state.rotateAngle=${a};renderTool()">${a}°</button>`).join('')}</div></div>
        <button class="btn-primary" onclick="doRotate(true)">🔄 Rotate Selected (${state.pageSelection.size||'all'})</button>
        <button class="btn-secondary" onclick="doRotate(false)">Rotate All Pages</button>`;
      break;

    case 'delete':
      html += `<p style="color:var(--danger-text);font-size:13px">${state.pageSelection.size} page(s) selected</p>
        <button class="btn-danger" onclick="doDelete()">🗑 Delete Selected Pages</button>`;
      break;

    case 'reorder':
      html += `<p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">Drag and drop page thumbnails below to rearrange them. Click "Apply" when done.</p>`;
      if (state.pdfBytes && state.totalPages > 1) {
        const isChanged = state.pageOrder.some((v, i) => v !== i);
        html += `<button class="btn-primary" onclick="applyPageReorder()" ${!isChanged ? 'disabled style="opacity:0.5"' : ''}>✅ Apply New Order</button>`;
        if (isChanged) html += `<button class="btn-secondary" onclick="state.pageOrder=Array.from({length:state.totalPages},(_,i)=>i);renderPdfPages(state.pdfBytes,state.zoom).then(()=>{renderContent();renderTool()})">Reset Order</button>`;
        html += `<p class="reorder-hint">Current order: ${state.pageOrder.map(i=>i+1).join(', ')}</p>`;
      } else if (state.pdfBytes) {
        html += `<p style="font-size:12px;color:var(--text-ghost)">Need at least 2 pages to reorder.</p>`;
      } else {
        html += `<p style="font-size:12px;color:var(--text-ghost)">Load a PDF first.</p>`;
      }
      break;

    case 'watermark':
      html += `<div class="field-group"><span class="field-label">Watermark Text</span>
        <input class="text-input" value="${state.watermarkText}" onchange="state.watermarkText=this.value"></div>
        <div class="field-group"><span class="field-label">Size: ${state.watermarkSize}px</span>
        <input type="range" class="range-input" min="20" max="120" value="${state.watermarkSize}" onchange="state.watermarkSize=+this.value;renderTool()"></div>
        <div class="field-group"><span class="field-label">Opacity: ${(state.watermarkOpacity*100).toFixed(0)}%</span>
        <input type="range" class="range-input" min="0.05" max="0.5" step="0.01" value="${state.watermarkOpacity}" onchange="state.watermarkOpacity=+this.value;renderTool()"></div>
        <button class="btn-primary" onclick="doWatermark()">💧 Add Watermark</button>`;
      break;

    case 'pagenums':
      html += `<div class="field-group"><span class="field-label">Format</span>
        <input class="text-input" value="${state.pageNumFormat}" onchange="state.pageNumFormat=this.value" placeholder="Page {n} of {total}"></div>
        <div class="field-group"><span class="field-label">Position</span>
        <div class="option-grid cols-3">${["top-left","top-center","top-right","bottom-left","bottom-center","bottom-right"].map(p=>
          `<button class="option-btn ${state.pageNumPos===p?'active':''}" onclick="state.pageNumPos='${p}';renderTool()">${p.replace('-',' ')}</button>`).join('')}</div></div>
        <button class="btn-primary" onclick="doPageNumbers()"># Add Page Numbers</button>`;
      break;

    case 'compress':
      if (state.pdfBytes) html += `<p style="font-size:13px;color:var(--text-dim)">Current: ${(state.pdfBytes.length/1024).toFixed(0)} KB</p>`;
      html += `<button class="btn-primary" onclick="doCompress()">📦 Compress & Download</button>`;
      break;

    case 'toimage':
      if (state.totalPages) html += `<p style="font-size:13px;color:var(--text-dim)">${state.totalPages} pages will be exported</p>`;
      html += `<button class="btn-primary" onclick="doExportImages()">🖼 Export All as PNG</button>`;
      break;

    case 'metadata':
      html += `<div class="field-group"><span class="field-label">Title</span><input class="text-input" id="metaTitleInput" placeholder="Document title"></div>
        <div class="field-group"><span class="field-label">Author</span><input class="text-input" id="metaAuthorInput" placeholder="Author name"></div>
        <div class="field-group"><span class="field-label">Subject</span><input class="text-input" id="metaSubjectInput" placeholder="Subject"></div>
        <button class="btn-primary" onclick="doUpdateMetadata()">ℹ️ Update & Download</button>`;
      break;
  }

  html += `<div id="statusArea"></div>`;
  panel.innerHTML = html;
  if (state.activeTool === 'sign') setTimeout(setupSignCanvas, 50);

  // Sync font size slider label
  const fsSlider = document.getElementById('tbFontSize');
  if (fsSlider) {
    fsSlider.addEventListener('input', () => {
      const lbl = document.getElementById('tbFontSizeLabel');
      if (lbl) lbl.textContent = fsSlider.value + 'px';
    });
  }
}

// ==================== RENDER CONTENT ====================
function renderContent() {
  const el = document.getElementById('content');
  if (!state.pdfBytes) {
    el.innerHTML = `<div class="welcome"><div class="welcome-inner">
      <div class="welcome-icon"><span>📄</span></div>
      <h2>Welcome to PDF Studio Pro</h2>
      <p>Upload a PDF to view, edit, merge, split, annotate, sign, and more — all in your browser.</p>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="drop-icon">📂</div>
        <div class="drop-text">Drag & drop a PDF here</div>
        <div class="drop-hint">or click to browse files</div>
      </div>
      <div style="text-align:center;margin-top:16px;margin-bottom:4px">
        <button class="btn-primary" style="width:auto;padding:12px 24px;font-size:14px;border-radius:12px;display:inline-block" onclick="state.activeTool='scan';buildSidebar();buildMobileToolbar();renderTool();openCamera()">📷 Scan a Document</button>
      </div>
      <div class="feature-grid">
        <div class="feature-card"><span>📷</span><p>Scan</p></div>
        <div class="feature-card"><span>🔤</span><p>Text Boxes</p></div>
        <div class="feature-card"><span>✂️</span><p>Split</p></div>
        <div class="feature-card"><span>✍️</span><p>Sign</p></div>
      </div></div></div>`;
    setupDropZone();
    return;
  }

  let html = `<div class="page-nav">
    <button ${state.currentPage<=1?'disabled':''} onclick="state.currentPage=Math.max(1,state.currentPage-1);renderContent()">← Prev</button>
    <span>Page ${state.currentPage} of ${state.totalPages}</span>
    <button ${state.currentPage>=state.totalPages?'disabled':''} onclick="state.currentPage=Math.min(state.totalPages,state.currentPage+1);renderContent()">Next →</button>
  </div>`;

  // Page canvas with overlay zone for text boxes
  if (state.pageImages[state.currentPage - 1]) {
    html += `<div class="page-canvas-wrapper">
      <div class="page-canvas" id="pageCanvas">
        <img src="${state.pageImages[state.currentPage-1]}" alt="Page ${state.currentPage}" id="pageImg">
      </div>
    </div>`;
  }

  // Thumbnails
  const isSelectable = ['delete','rotate','split'].includes(state.activeTool);
  const isReorder = state.activeTool === 'reorder';
  const gridClass = isReorder ? 'reorder-grid' : 'thumb-grid';
  const headerText = isReorder ? 'Drag to Reorder' : (isSelectable ? 'All Pages (Click to select)' : 'All Pages');
  html += `<div class="thumb-section"><h3>${headerText}</h3><div class="${gridClass}">`;

  // In reorder mode, show pages in current order
  const pageIndices = isReorder ? state.pageOrder : Array.from({length: state.totalPages}, (_, i) => i);
  for (let pos = 0; pos < pageIndices.length; pos++) {
    const i = pageIndices[pos];
    const sel = state.pageSelection.has(i), cur = state.currentPage === i+1;
    const label = isReorder ? `${i+1}` : `${i+1}`;
    html += `<div class="thumb${sel?' selected':''}${cur?' current':''}" onclick="thumbClick(${i})" data-page="${i}">
      <img src="${state.pageImages[pos]}"><div class="thumb-num"><span>${label}</span></div>
      ${sel?'<div class="thumb-check"><span>✓</span></div>':''}
    </div>`;
  }
  html += `</div></div>`;
  el.innerHTML = html;

  // Now render text box overlays on top of the page canvas
  const canvas = document.getElementById('pageCanvas');
  if (canvas) renderTextBoxes(canvas);

  // Setup drag reorder if in reorder mode
  if (isReorder) setTimeout(setupReorderDrag, 50);
}

function thumbClick(i) {
  state.currentPage = i + 1;
  if (['delete','rotate','split'].includes(state.activeTool)) {
    state.pageSelection.has(i) ? state.pageSelection.delete(i) : state.pageSelection.add(i);
    renderTool();
  }
  renderContent();
}

// ==================== DRAG & DROP ====================
function setupDropZone() {
  const zone = document.getElementById('dropZone');
  if (!zone) return;
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => { zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') loadPdfFile(file);
    else setStatus('Please drop a PDF file', true);
  });
}

// Global drag-drop: allow dropping a PDF anywhere on the page
document.addEventListener('dragover', (e) => { e.preventDefault(); });
document.addEventListener('drop', (e) => {
  e.preventDefault();
  const file = e.dataTransfer?.files?.[0];
  if (file && file.type === 'application/pdf') loadPdfFile(file);
});

async function loadPdfFile(file) {
  state.fileName = file.name;
  state.pdfBytes = new Uint8Array(await file.arrayBuffer());
  state.currentPage = 1; state.pageSelection = new Set();
  textBoxes = {}; selectedBoxId = null;
  await renderPdfPages(state.pdfBytes, state.zoom);
  updateHeader(); renderTool(); renderContent();
}

// ==================== MOBILE TOOLBAR ====================
function buildMobileToolbar() {
  const inner = document.getElementById('mobileToolbarInner');
  if (!inner) return;
  inner.innerHTML = TOOLS.map(t =>
    `<button class="mob-tool ${t.id === state.activeTool ? 'active' : ''}" onclick="mobileSwitchTool('${t.id}')">
      ${t.icon}<span>${t.name}</span>
    </button>`
  ).join('');
}

function mobileSwitchTool(id) {
  const drawer = document.getElementById('panelDrawer');
  if (state.activeTool === id && drawer.classList.contains('open')) {
    drawer.classList.remove('open');
    return;
  }
  state.activeTool = id;
  buildSidebar();
  buildMobileToolbar();
  renderTool();
  renderContent();
  // Clone tool panel content into drawer, fixing duplicate IDs
  const panel = document.getElementById('toolPanel');
  let drawerHtml = panel.innerHTML;
  // Rename IDs in the drawer copy to avoid duplicates
  drawerHtml = drawerHtml.replace(/id="signatureCanvas"/g, 'id="drawerSignatureCanvas"');
  drawerHtml = drawerHtml.replace(/id="statusArea"/g, 'id="drawerStatusArea"');
  drawer.innerHTML = drawerHtml;
  drawer.classList.add('open');
  // Setup sign canvas on the drawer version
  if (id === 'sign') {
    setTimeout(() => {
      const dc = document.getElementById('drawerSignatureCanvas');
      if (!dc) return;
      const getCtx = () => dc.getContext('2d');
      dc.addEventListener('mousedown', e => { isDrawing=true; const ctx=getCtx(), rect=dc.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(e.clientX-rect.left,e.clientY-rect.top); });
      dc.addEventListener('mousemove', e => { if(!isDrawing)return; const ctx=getCtx(), rect=dc.getBoundingClientRect(); ctx.strokeStyle=state.drawColor; ctx.lineWidth=state.drawSize; ctx.lineCap='round'; ctx.lineTo(e.clientX-rect.left,e.clientY-rect.top); ctx.stroke(); });
      dc.addEventListener('mouseup', ()=>isDrawing=false);
      dc.addEventListener('touchstart', e => { e.preventDefault(); isDrawing=true; const ctx=getCtx(), rect=dc.getBoundingClientRect(); const t=e.touches[0]; ctx.beginPath(); ctx.moveTo(t.clientX-rect.left,t.clientY-rect.top); }, { passive: false });
      dc.addEventListener('touchmove', e => { e.preventDefault(); if(!isDrawing)return; const ctx=getCtx(), rect=dc.getBoundingClientRect(); const t=e.touches[0]; ctx.strokeStyle=state.drawColor; ctx.lineWidth=state.drawSize; ctx.lineCap='round'; ctx.lineTo(t.clientX-rect.left,t.clientY-rect.top); ctx.stroke(); }, { passive: false });
      dc.addEventListener('touchend', e => { e.preventDefault(); isDrawing=false; }, { passive: false });
    }, 80);
  }
}

// Close drawer when tapping on the content area
document.addEventListener('click', (e) => {
  if (e.target.closest('.content') && !e.target.closest('.text-box')) {
    document.getElementById('panelDrawer')?.classList.remove('open');
  }
});

// ==================== TOUCH SUPPORT FOR BOXES ====================
function addTouchSupport() {
  // Make text boxes draggable on touch devices
  document.addEventListener('touchstart', (e) => {
    const box = e.target.closest('.text-box');
    if (!box || e.target.closest('.resize-handle') || e.target.closest('.delete-btn') || e.target.tagName === 'TEXTAREA') return;
    const id = parseInt(box.dataset.id);
    selectedBoxId = id;
    highlightSelected();
    const touch = e.touches[0];
    const rect = box.getBoundingClientRect();
    dragOffset.x = touch.clientX - rect.left;
    dragOffset.y = touch.clientY - rect.top;

    const boxData = getPageBoxes(state.currentPage).find(b => b.id === id);
    if (!boxData) return;

    function onMove(ev) {
      ev.preventDefault();
      const t = ev.touches[0];
      const parent = box.parentElement.getBoundingClientRect();
      boxData.x = Math.max(0, t.clientX - parent.left - dragOffset.x);
      boxData.y = Math.max(0, t.clientY - parent.top - dragOffset.y);
      box.style.left = boxData.x + 'px';
      box.style.top = boxData.y + 'px';
    }
    function onEnd() {
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
    }
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  }, { passive: false });

  // Touch resize
  document.addEventListener('touchstart', (e) => {
    if (!e.target.classList.contains('resize-handle')) return;
    e.preventDefault();
    const box = e.target.closest('.text-box');
    const id = parseInt(box.dataset.id);
    const boxData = getPageBoxes(state.currentPage).find(b => b.id === id);
    if (!boxData) return;
    selectedBoxId = id;
    const touch = e.touches[0];
    const startX = touch.clientX, startY = touch.clientY;
    const startW = boxData.w, startH = boxData.h;

    function onMove(ev) {
      ev.preventDefault();
      const t = ev.touches[0];
      boxData.w = Math.max(40, startW + (t.clientX - startX));
      boxData.h = Math.max(24, startH + (t.clientY - startY));
      box.style.width = boxData.w + 'px';
      box.style.height = boxData.h + 'px';
    }
    function onEnd() {
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
    }
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  }, { passive: false });
}
addTouchSupport();

// File input handler
document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) loadPdfFile(file);
});

// ==================== PWA SERVICE WORKER ====================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(() => {
    console.log('Service Worker registered');
  }).catch(err => console.log('SW registration failed:', err));
}
</script>
